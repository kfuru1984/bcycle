# =============================================================
# サイクルモデル パラメータ (US)
# =============================================================

normalize:
  rolling_window_months: 120        # 10年
  min_periods_months: 60            # 5年(これ未満は NaN)
  winsorize_lower: 0.01
  winsorize_upper: 0.99
  use_rolling_winsorize: false

composite:
  method: percentile_mean
  min_indicator_frac: 0.5

  weights:
    # 実装済み9指標 (等加重)
    ip_yoy: 1.0
    unemployment_rate: 1.0
    nfp_yoy: 1.0
    housing_starts_yoy: 1.0
    core_cpi_yoy: 1.0
    real_policy_rate: 1.0
    yc_10y2y: 1.0
    consumer_confidence: 1.0
    exports_yoy: 1.0
    # 中間指標 (derived 計算の素材; composite に入れない)
    fedfunds: 0.0
    # 実質賃金計算素材 (composite に含めない)
    nominal_wage_yoy: 0.0

  invert_sign:
    - unemployment_rate

momentum:
  lookback_months: 3

stage_classification:
  level_low: 33.0
  level_high: 60.0
  momentum_threshold: 0.0
  hysteresis_periods: 2
