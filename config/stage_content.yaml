# =============================================================
# ステージ別コンテンツ定義 (Investment Clock 準拠)
# =============================================================
# ダッシュボードの推奨エクスポージャー・セクター・ファクター表示に使用

stages:
  回復:
    label_en: "Early Cycle"
    trend_label: "底打ち・回復"
    exposure: "Gross拡大開始 (Cautious Risk On → Risk On)"
    exposure_color: "#22c55e"
    exposure_desc: >
      底打ち確認後の段階的リスク拡大。景気敏感株を中心にポジションを積み上げる局面。
      信用スプレッド縮小・利下げ打ち止め確認後に攻勢に転じる。
    sector_buy: ["素材", "工業", "金融", "一般消費財"]
    sector_sell: ["公益(早期売り)", "生活必需品(早期売り)"]
    sector_buy_color: "#22c55e"
    sector_sell_color: "#ef4444"
    factors: ["バリュー", "シクリカル", "小型株", "モメンタム"]
    biz_cycle: "Early Cycle"

  上昇:
    label_en: "Mid Cycle"
    trend_label: "全般的拡大"
    exposure: "Gross最大 (Maximum Risk On)"
    exposure_color: "#16a34a"
    exposure_desc: >
      経営者も強気化、金利・インフレ上昇開始。優良株から小型株へシフト。
      鉄鋼・非鉄金属など景気循環株が注目。
    sector_buy: ["素材", "鉱山", "エネルギー", "資本財", "金融", "シクリカル"]
    sector_sell: ["スーパーマーケット", "公益(早期)"]
    sector_buy_color: "#22c55e"
    sector_sell_color: "#f97316"
    factors: ["シクリカルバリュー", "クオリティ", "小型株"]
    biz_cycle: "Mid Cycle"

  成熟:
    label_en: "Late Cycle"
    trend_label: "ピーク圏・過熱"
    exposure: "Gross縮小開始 (Risk Reduction Begins)"
    exposure_color: "#f59e0b"
    exposure_desc: >
      インフレが経済支配。FRBが介入して引き締め。株式は最後の上げ波動。
      エネルギー・金鉱株が強い。
    sector_buy: ["重厚長大", "紙パ", "化学", "石油", "金鉱", "インフレ耐性株"]
    sector_sell: ["金融", "住宅", "自動車", "小売(早期)"]
    sector_buy_color: "#f59e0b"
    sector_sell_color: "#ef4444"
    factors: ["クオリティ", "インフレ耐性", "ディフェンシブ", "大型株"]
    biz_cycle: "Late Cycle"

  軟化:
    label_en: "End Cycle (Early)"
    trend_label: "減速・調整"
    exposure: "Gross削減 (Risk Off 開始)"
    exposure_color: "#f97316"
    exposure_desc: >
      景気減速が鮮明化。リスク資産の圧縮を開始。ディフェンシブセクターへのシフトを加速。
      現金比率を高め、次の回復フェーズに備える。
    sector_buy: ["生活必需品", "ヘルスケア", "公益"]
    sector_sell: ["シクリカル", "資本財", "小型株"]
    sector_buy_color: "#22c55e"
    sector_sell_color: "#ef4444"
    factors: ["ディフェンシブ", "低ボラ", "クオリティ", "大型株"]
    biz_cycle: "End Cycle"

  下降:
    label_en: "End Cycle"
    trend_label: "悪化継続"
    exposure: "Gross最小→徐々に拡大 (Risk Off → Cautious Risk On)"
    exposure_color: "#ef4444"
    exposure_desc: >
      悪化継続。FRBが景気刺激で利下げ。金利低下4-12週間後に株価大幅急騰の
      局面。インフレ低下中の金投資は危険。後期は幅広く大手企業株を組み入れ。
    sector_buy: ["医薬", "スーパーマーケット", "公益", "大手優良株(後期)"]
    sector_sell: ["金鉱(インフレ低下中)", "シクリカル", "小型株"]
    sector_buy_color: "#3b82f6"
    sector_sell_color: "#f97316"
    factors: ["ディフェンシブ", "金利敏感バリュー(後期)", "クオリティ", "配当"]
    biz_cycle: "End Cycle"

